<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Anzan Trainer</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anzan Trainer">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <section id="setup-screen" class="screen active">
      <div class="shell">
        <header class="hero">
          <div class="badge">PWA</div>
          <h1>Anzan Trainer</h1>
          <p>One-question-at-a-time mobile trainer for mitori, kake, and wari.</p>
        </header>

        <div class="card settings">
          <div class="grid">
            <label>
              <span>Target level</span>
              <select id="level">
                <option value="6">6 kyu</option>
                <option value="5">5 kyu</option>
                <option value="4">4 kyu</option>
                <option value="3">3 kyu</option>
                <option value="2">2 kyu</option>
                <option value="1">1 kyu</option>
              </select>
            </label>

            <label>
              <span>Seed</span>
              <input id="seed" inputmode="numeric" placeholder="Optional">
            </label>

            <label>
              <span>Day</span>
              <input id="day" inputmode="numeric" value="1">
            </label>

            <label>
              <span>Feedback pause</span>
              <select id="feedbackPause">
                <option value="0">0.0s</option>
                <option value="0.3" selected>0.3s</option>
                <option value="0.5">0.5s</option>
                <option value="0.8">0.8s</option>
                <option value="1.0">1.0s</option>
              </select>
            </label>

            <label>
              <span>Mitori count</span>
              <input id="mitoriCount" inputmode="numeric">
            </label>

            <label>
              <span>Kake count</span>
              <input id="kakeCount" inputmode="numeric">
            </label>

            <label>
              <span>Wari count</span>
              <input id="wariCount" inputmode="numeric">
            </label>

            <label class="toggle-row">
              <span>Redo misses until correct</span>
              <input id="redoMisses" type="checkbox" checked>
            </label>

            <label class="toggle-row">
              <span>Shuffle questions</span>
              <input id="shuffleQuestions" type="checkbox" checked>
            </label>
          </div>

          <div class="preset-row">
            <button class="secondary" data-preset="defaults">Use level defaults</button>
            <button class="secondary" data-preset="double">Double volume</button>
          </div>

          <div class="actions">
            <button id="startBtn" class="primary">Start session</button>
          </div>
        </div>

        <div class="card install-card">
          <h2>iPhone install</h2>
          <p>Open this in Safari, tap Share, then Add to Home Screen.</p>
        </div>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="quiz-shell">
        <header class="topbar">
          <div class="stats">
            <div><strong id="progressText">1 / 60</strong></div>
            <div id="accuracyText">Accuracy: 100%</div>
            <div id="roundText">Round 1</div>
          </div>
          <button id="quitBtn" class="secondary small">Quit</button>
        </header>

        <main class="question-wrap">
          <div id="feedbackBanner" class="feedback hidden"></div>
          <div class="question-card">
            <div class="question-meta">
              <span id="categoryPill" class="pill">MITORI</span>
              <span id="questionIndexPill" class="pill subtle">#1</span>
            </div>
            <div id="questionText" class="question-text">83-2-4+2+2</div>
          </div>

          <form id="answerForm" class="answer-form" autocomplete="off">
            <input id="answerInput" inputmode="numeric" enterkeyhint="done" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type answer">
            <button type="submit" class="primary">Submit</button>
          </form>

          <div class="keypad">
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key ghost" data-key="back">⌫</button>
            <button class="key" data-key="0">0</button>
            <button class="key ghost" data-key="clear">Clear</button>
          </div>
        </main>
      </div>
    </section>

    <section id="done-screen" class="screen">
      <div class="shell">
        <div class="card done-card">
          <h2>Session complete</h2>
          <p id="doneSummary">You got 56/60 correct on first pass.</p>
          <div id="mistakeSummary" class="muted"></div>
          <div class="actions">
            <button id="againBtn" class="primary">New session</button>
            <button id="repeatBtn" class="secondary">Run same settings again</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
